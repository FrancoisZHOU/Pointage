<title>Pointage</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --cream: #FBF7F0; --ink: #1F1B17; --wine: #7A2E2E; --gold: #C9A961;
    --moss: #4A5D3A; --stone: #8B8478; --paper: #F1EADD; --line: rgba(31,27,23,0.08);
    --shadow: 0 1px 2px rgba(0,0,0,0.03), 0 6px 20px rgba(0,0,0,0.05);
  }
  html, body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--cream); color: var(--ink);
    min-height: 100vh; overflow-x: hidden;
  }
  body { background-image: radial-gradient(circle at 15% 10%, rgba(201,169,97,0.05), transparent 40%), radial-gradient(circle at 85% 90%, rgba(122,46,46,0.04), transparent 40%); }
  .serif { font-family: 'Cormorant Garamond', Georgia, serif; }
  .hidden { display: none !important; }
  .tnum { font-variant-numeric: tabular-nums; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select { font-family: inherit; font-size: 16px; }

  /* ============ EMPLOYEE VIEW ============ */
  #employee-view { min-height: 100vh; display: flex; flex-direction: column; }
  .emp-header {
    padding: 22px 26px 18px; display: flex; justify-content: space-between; align-items: flex-start;
    border-bottom: 1px solid var(--line);
  }
  .emp-header .brand { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; letter-spacing: -0.3px; }
  .emp-header .brand small { display: block; font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--stone); font-weight: 600; margin-top: 2px; }
  .emp-header .now { text-align: right; }
  .emp-header .now .time { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 600; color: var(--wine); line-height: 1; }
  .emp-header .now .day { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--stone); margin-top: 5px; }

  .cards { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 20px; align-content: start; }
  @media (max-width: 620px) { .cards { grid-template-columns: 1fr; } }

  .ecard {
    background: #fff; border: 1px solid var(--line); border-radius: 6px; padding: 24px 22px 22px;
    box-shadow: var(--shadow); position: relative; overflow: hidden; display: flex; flex-direction: column;
    transition: box-shadow .25s ease;
  }
  .ecard::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background: var(--stone); opacity:.25; transition: all .25s; }
  .ecard.service::before { background: var(--moss); opacity:1; }
  .ecard.pause::before { background: var(--gold); opacity:1; }
  .ecard .ename { font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:600; line-height:1; }
  .ecard .estate { margin-top:8px; font-size:12px; letter-spacing:2px; text-transform:uppercase; font-weight:600; color:var(--stone); }
  .ecard.service .estate { color: var(--moss); }
  .ecard.pause .estate { color: #A8852F; }
  .ecard .etimer { font-family:'Cormorant Garamond',serif; font-size:46px; font-weight:600; margin:14px 0 4px; line-height:1; letter-spacing:-1px; }
  .ecard .esub { font-size:12px; color:var(--stone); min-height:16px; letter-spacing:.3px; }
  .ecard .ebtns { margin-top:20px; display:flex; flex-direction:column; gap:10px; }
  .ecard .ebtns.row { flex-direction:row; }
  .ebtn {
    flex:1; padding:17px 14px; border-radius:4px; font-size:13px; font-weight:700; letter-spacing:2px;
    text-transform:uppercase; transition: transform .08s ease, background .15s ease, opacity .15s; text-align:center;
  }
  .ebtn:active { transform: scale(0.97); }
  .ebtn.start { background:var(--ink); color:var(--cream); }
  .ebtn.start:hover { background:var(--moss); }
  .ebtn.end { background:var(--wine); color:#fff; }
  .ebtn.pause { background:var(--paper); color:var(--ink); border:1px solid var(--line); }
  .ebtn.resume { background:var(--gold); color:#fff; }
  .ecard .toast {
    position:absolute; inset:0; background:rgba(255,255,255,.96); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:6px; opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .ecard .toast.show { opacity:1; }
  .ecard .toast .check { width:54px; height:54px; border-radius:50%; background:var(--moss); color:#fff; display:flex; align-items:center; justify-content:center; font-size:28px; }
  .ecard .toast.endt .check { background:var(--wine); }
  .ecard .toast .ttime { font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:600; }
  .ecard .toast .tlabel { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--stone); }
  .ecard .toast .tsegs { font-size:12px; color:var(--stone); text-align:center; margin-top:4px; line-height:1.5; padding:0 10px; }

  .admin-link {
    text-align:center; padding:18px; font-size:10px; letter-spacing:3px; text-transform:uppercase;
    color:var(--stone); opacity:.5; border-top:1px solid var(--line);
  }

  /* ============ MODAL / ADMIN ============ */
  .overlay { position:fixed; inset:0; background:rgba(31,27,23,.45); backdrop-filter:blur(3px); z-index:50; display:flex; align-items:center; justify-content:center; padding:18px; }
  .modal { background:var(--cream); border-radius:8px; width:100%; max-width:440px; max-height:92vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.3); }
  .modal.wide { max-width:920px; }
  .modal-head { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--cream); z-index:2; }
  .modal-head h2 { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; }
  .modal-body { padding:22px 24px; }
  .x { font-size:26px; color:var(--stone); line-height:1; padding:4px 8px; }

  /* PIN pad */
  .pin-display { display:flex; gap:12px; justify-content:center; margin:8px 0 22px; }
  .pin-dot { width:14px; height:14px; border-radius:50%; border:1.5px solid var(--stone); transition:all .15s; }
  .pin-dot.filled { background:var(--wine); border-color:var(--wine); }
  .pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .pin-key { padding:18px; font-size:22px; font-family:'Cormorant Garamond',serif; font-weight:600; background:#fff; border:1px solid var(--line); border-radius:6px; transition:transform .08s; }
  .pin-key:active { transform:scale(.95); background:var(--paper); }
  .pin-err { color:var(--wine); text-align:center; font-size:13px; min-height:18px; margin-top:12px; }
  .link-btn { background:none; color:var(--stone); text-decoration:underline; font-size:12px; display:block; margin:14px auto 0; }

  /* Admin tabs */
  .tabs { display:flex; gap:4px; padding:0 24px; border-bottom:1px solid var(--line); background:var(--cream); position:sticky; top:65px; z-index:2; overflow-x:auto; }
  .tab { padding:14px 16px; font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--stone); border-bottom:2px solid transparent; white-space:nowrap; }
  .tab.active { color:var(--wine); border-bottom-color:var(--wine); }

  .lang-switch { display:flex; gap:0; border:1px solid var(--line); border-radius:5px; overflow:hidden; }
  .lang-switch button { padding:5px 10px; font-size:11px; font-weight:600; color:var(--stone); background:#fff; }
  .lang-switch button.active { background:var(--wine); color:#fff; }

  /* Records */
  .day-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .day-nav button { padding:8px 14px; background:#fff; border:1px solid var(--line); border-radius:5px; font-size:18px; }
  .day-nav .dlabel { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; }
  .rec { background:#fff; border:1px solid var(--line); border-radius:6px; padding:16px 18px; margin-bottom:12px; }
  .rec h3 { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; display:flex; justify-content:space-between; align-items:baseline; }
  .rec h3 .ot { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700; color:var(--wine); letter-spacing:.5px; }
  .rec h3 .ot.zero { color:var(--stone); }
  .rec .seg { font-size:13px; color:var(--ink); margin-top:8px; line-height:1.6; }
  .rec .seg .lbl { display:inline-block; min-width:64px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--stone); }
  .rec .pausetag { color:var(--gold); font-size:11px; }
  .rec .meta { font-size:12px; color:var(--stone); margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); display:flex; justify-content:space-between; }
  .rec .editrow { margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; }
  .mini { padding:7px 12px; font-size:11px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; border-radius:4px; border:1px solid var(--line); background:#fff; }
  .mini.wine { background:var(--wine); color:#fff; border-color:var(--wine); }
  .mini.ghost { color:var(--stone); }
  .empty { text-align:center; color:var(--stone); padding:30px; font-size:14px; }
  .override-flag { display:inline-block; font-size:10px; background:var(--gold); color:#fff; padding:2px 7px; border-radius:3px; letter-spacing:1px; text-transform:uppercase; margin-left:8px; vertical-align:middle; }

  /* Forms */
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--stone); margin-bottom:6px; font-weight:600; }
  .field input, .field select { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:5px; background:#fff; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .row3 { display:grid; grid-template-columns:1fr 1fr auto; gap:10px; align-items:end; }
  .btn-primary { width:100%; padding:15px; background:var(--ink); color:var(--cream); border-radius:5px; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
  .btn-primary:active { transform:scale(.99); }
  .btn-sec { width:100%; padding:13px; background:transparent; border:1px solid var(--line); border-radius:5px; font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--ink); margin-top:8px; }
  .seg-edit { background:var(--paper); border-radius:6px; padding:12px; margin-bottom:10px; }
  .seg-edit .seg-edit-head { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--stone); font-weight:600; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  .sched-day { background:#fff; border:1px solid var(--line); border-radius:6px; padding:12px 14px; margin-bottom:8px; }
  .sched-day .dn { font-weight:600; font-size:14px; margin-bottom:8px; }
  .sched-times { font-size:13px; color:var(--stone); }
  .emp-pick { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
  .emp-pick button { padding:9px 16px; border:1px solid var(--line); border-radius:20px; font-size:13px; font-weight:600; background:#fff; color:var(--stone); }
  .emp-pick button.active { background:var(--wine); color:#fff; border-color:var(--wine); }
  .note { font-size:12px; color:var(--stone); line-height:1.6; background:var(--paper); padding:12px 14px; border-radius:6px; margin-bottom:16px; }
  .month-pick { display:flex; gap:10px; align-items:center; margin-bottom:16px; }
  .month-pick select { flex:1; }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
  .stat { background:#fff; border:1px solid var(--line); border-radius:6px; padding:16px; }
  .stat .sl { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--stone); }
  .stat .sv { font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:600; margin-top:4px; }
  .stat .sv small { font-size:14px; color:var(--stone); }
  .danger { color:var(--wine); }
  .pause-list-item { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .pause-list-item input { flex:1; }
  .recovery-box { background:var(--ink); color:var(--gold); font-family:'Cormorant Garamond',serif; font-size:28px; letter-spacing:4px; text-align:center; padding:18px; border-radius:6px; margin:12px 0; font-weight:600; }
</style>
</head>
<body>

<div id="employee-view">
  <div class="emp-header">
    <div class="brand serif">Pointage<small id="brand-sub">Présences</small></div>
    <div class="now">
      <div class="time tnum serif" id="live-clock">--:--</div>
      <div class="day" id="live-date"></div>
    </div>
  </div>
  <div class="cards" id="emp-cards"></div>
  <div class="admin-link" id="open-admin">· Administration ·</div>
</div>

<!-- modal mount -->
<div id="modal-mount"></div>

<script>
/* =========================================================
   POINTAGE — système de pointage hors-ligne
   Données: localStorage. Aucune dépendance externe.

// ---------- i18n (admin only; employé = FR) ----------
const I18N = {

    schedule:'每周排班', editSchedule:'修改排班', addEmp:'添加员工',
    name:'姓名', weeklyTotal:'每周合计', changePin:'修改密码', oldPin:'当前密码',
    newPin:'新密码', confirmPin:'确认密码', backup:'数据备份', exportData:'导出数据',
    importData:'导入数据', recovery:'恢复码', forgot:'忘记密码？',
    enterRecovery:'输入恢复码', dayOverride:'当天临时排班',
    rest:'休息', confirmDel:'删除这条记录？', confirmDelEmp:'删除该员工及其全部历史记录？',
    pinChanged:'密码已修改', saved:'已保存', wrongOld:'当前密码错误', pinMismatch:'两次密码不一致',

    months:['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'],
    backInfo:'备份会下载一个 .json 文件，包含全部数据和恢复码。请妥善保存。',

function t(k){ return (I18N[DATA.lang]||I18N.fr)[k]; }

// ---------- DATA MODEL ----------
const STORE_KEY = 'pointage_data_v1';
let DATA = null;

function defaultData(){
  return {
    version:1, lang:'fr', password:'2808',
    recovery: genRecovery(),
    employees:[
      { id:'camille', name:'Camille', schedule:{
        1:{am:null, pm:['18:00','21:00']},
        2:{am:null, pm:['18:30','21:00']},
        3:{am:['11:30','13:00'], pm:['18:00','20:00']},
        4:null,
        5:{am:['11:30','13:00'], pm:['18:30','21:30']},
        6:{am:null, pm:['18:30','21:30']},
        0:{am:null, pm:['18:00','21:30']}
      }},
      { id:'kim', name:'Kim', schedule:{
        1:null,
        2:{am:['11:30','13:00'], pm:['17:30','20:30']},
        3:{am:null, pm:['19:00','21:00']},
        4:{am:['11:30','13:00'], pm:['18:00','20:30']},
        5:{am:null, pm:['17:30','21:00']},
        6:{am:['12:00','13:00'], pm:['17:30','21:00']},
        0:{am:null, pm:['17:30','21:00']}
      }}
    ],
    // records[dateKey][empId] = { shifts:[{start,end,pauses:[{start,end}]}], override:null|{am,pm} }
    records:{
      '2026-06-02':{
        camille:{ shifts:[{start:'18:25:00', end:'22:45:00', pauses:[]}], override:null },
        kim:{ shifts:[
          {start:'11:25:00', end:'13:50:00', pauses:[]},
          {start:'17:30:00', end:'22:30:00', pauses:[]}
        ], override:null }
      }
    },
    active:{} // active[empId] = { startTs, pauses:[{startTs,endTs}], status:'service'|'pause' }
  };
}
function genRecovery(){
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s='';
  for(let i=0;i<8;i++){ if(i===4)s+='-'; s+=ch[Math.floor(Math.random()*ch.length)]; }
  return s;
}
function load(){
  try{ const raw=localStorage.getItem(STORE_KEY); DATA = raw?JSON.parse(raw):defaultData(); }
  catch(e){ DATA = defaultData(); }
  if(!DATA.recovery) DATA.recovery = genRecovery();
  if(!DATA.active) DATA.active = {};
  save();
}
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(DATA)); }catch(e){} }
function emp(id){ return DATA.employees.find(e=>e.id===id); }

// ---------- TIME HELPERS ----------
function pad(n){ return String(n).padStart(2,'0'); }
function hms(d){ return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()); }
function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function toSec(t){ if(!t) return 0; const p=t.split(':').map(Number); return p[0]*3600+p[1]*60+(p[2]||0); }
function secToHMS(s){ s=Math.max(0,Math.round(s)); return pad(Math.floor(s/3600))+':'+pad(Math.floor(s%3600/60))+':'+pad(s%60); }
function secToHM(s){ s=Math.max(0,Math.round(s)); const h=Math.floor(s/3600), m=Math.floor(s%3600/60); return h+'h'+pad(m); }
function hm(t){ return t? t.slice(0,5):''; } // HH:MM display
function todayKey(){ return dateKey(new Date()); }

// span handling (no overnight expected, but guard)
function spanSec(startT,endT){ let s=toSec(startT), e=toSec(endT); if(e<s) e+=86400; return e-s; }

// ---------- COMPUTATION ----------
function getContract(empId, dKey){
  const rec = DATA.records[dKey] && DATA.records[dKey][empId];
  if(rec && rec.override) return rec.override;
  const e=emp(empId); if(!e) return {am:null,pm:null};
  const dow = new Date(dKey+'T12:00:00').getDay();
  const sc = e.schedule[dow];
  return sc?{am:sc.am||null, pm:sc.pm||null}:{am:null,pm:null};
}
function shiftNet(sh){
  let net = spanSec(sh.start, sh.end);
  (sh.pauses||[]).forEach(p=>{ if(p.start&&p.end) net -= spanSec(p.start,p.end); });
  return Math.max(0,net);
}
function shiftPause(sh){
  let pz=0; (sh.pauses||[]).forEach(p=>{ if(p.start&&p.end) pz+=spanSec(p.start,p.end); }); return pz;
}
// split threshold between am/pm
function bucketThreshold(contract){
  if(contract.am && contract.pm) return (toSec(contract.am[1])+toSec(contract.pm[0]))/2;
  return toSec('16:00'); // default split
}
function assignBucket(sh, contract){
  return toSec(sh.start) < bucketThreshold(contract) ? 'am' : 'pm';
}
// per-day overtime {am, pm, total}
function dayOvertime(empId, dKey){
  const rec = DATA.records[dKey] && DATA.records[dKey][empId];
  if(!rec || !rec.shifts || !rec.shifts.length) return {am:0,pm:0,total:0};
  const contract = getContract(empId, dKey);
  const buckets={am:[],pm:[]};
  rec.shifts.forEach(sh=>{ buckets[assignBucket(sh,contract)].push(sh); });
  function bucketOT(list, seg){
    if(!list.length) return 0;
    const netWorked = list.reduce((a,sh)=>a+shiftNet(sh),0);
    if(!seg) return netWorked; // hors planning → tout en heures sup
    const ins = list.map(sh=>toSec(sh.start)), outs = list.map(sh=>{ let e=toSec(sh.end); if(e<toSec(sh.start))e+=86400; return e; });
    const earliestIn = Math.min(...ins), latestOut = Math.max(...outs);
    const cStart=toSec(seg[0]), cEnd=toSec(seg[1]), cDur=cEnd-cStart;
    const presence = latestOut-earliestIn;
    const pauseEq = presence - netWorked;
    const ot = Math.max(latestOut,cEnd) - Math.min(earliestIn,cStart) - pauseEq - cDur;
    return Math.max(0, ot);
  }
  const am=bucketOT(buckets.am, contract.am), pm=bucketOT(buckets.pm, contract.pm);
  return {am, pm, total:am+pm};
}
function dayNetWorked(empId, dKey){
  const rec = DATA.records[dKey] && DATA.records[dKey][empId];
  if(!rec || !rec.shifts) return 0;
  return rec.shifts.reduce((a,sh)=>a+shiftNet(sh),0);
}
// worked segments of a shift (split by pauses) → [[start,end],...]
function shiftSegments(sh){
  const segs=[]; let cur=sh.start;
  (sh.pauses||[]).forEach(p=>{ if(p.start&&p.end){ segs.push([cur,p.start]); cur=p.end; } });
  segs.push([cur, sh.end]); return segs;
}

// ---------- SOUND (gentle two-tone) ----------
let AC=null;
function ping(end){
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended') AC.resume();
    const now=AC.currentTime;
    const notes = end? [659.25,523.25] : [523.25,659.25]; // C5,E5
    notes.forEach((f,i)=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type='sine'; o.frequency.value=f;
      const ts=now+i*0.09;
      g.gain.setValueAtTime(0, ts);
      g.gain.linearRampToValueAtTime(0.12, ts+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ts+0.22);
      o.connect(g); g.connect(AC.destination); o.start(ts); o.stop(ts+0.25);
    });
  }catch(e){}
}

// ---------- EMPLOYEE VIEW ----------
function liveState(empId){
  const a=DATA.active[empId];
  if(!a) return 'repos';
  return a.status;
}
function activeElapsed(empId){
  const a=DATA.active[empId]; if(!a) return 0;
  const now=Date.now();
  let span=(now - new Date(a.startTs).getTime())/1000;
  (a.pauses||[]).forEach(p=>{ const e=p.endTs?new Date(p.endTs).getTime():now; span-=(e-new Date(p.startTs).getTime())/1000; });
  return Math.max(0,span);
}
function todayCompletedNet(empId){
  const rec=DATA.records[todayKey()] && DATA.records[todayKey()][empId];
  if(!rec||!rec.shifts) return 0;
  return rec.shifts.reduce((a,sh)=>a+shiftNet(sh),0);
}
// contract end for an in-progress shift (to choose Fin de service vs Terminer)
function activeContractEnd(empId){
  const a=DATA.active[empId]; if(!a) return null;
  const startD=new Date(a.startTs);
  const contract=getContract(empId, dateKey(startD));
  const startSec=startD.getHours()*3600+startD.getMinutes()*60+startD.getSeconds();
  const seg = startSec < bucketThreshold(contract) ? contract.am : contract.pm;
  return seg? toSec(seg[1]) : null;
}
function endLabel(empId){
  const ce=activeContractEnd(empId);
  if(ce===null) return 'Terminer';
  const now=new Date(); const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
  return nowSec>=ce ? 'Terminer' : 'Fin de service';
}

function renderEmpCards(){
  const wrap=document.getElementById('emp-cards');

    const totalToday = todayCompletedNet(e.id) + (st!=='repos'?activeElapsed(e.id):0);

    if(st==='repos'){
      btns=`<div class="ebtns"><button class="ebtn start" data-act="start" data-id="${e.id}">Commencer</button></div>`;
    } else if(st==='service'){
      btns=`<div class="ebtns row"><button class="ebtn pause" data-act="pause" data-id="${e.id}">Pause</button><button class="ebtn end" data-act="end" data-id="${e.id}">${endLabel(e.id)}</button></div>`;
    } else { // pause
      btns=`<div class="ebtns row"><button class="ebtn resume" data-act="resume" data-id="${e.id}">Reprendre</button><button class="ebtn end" data-act="end" data-id="${e.id}">${endLabel(e.id)}</button></div>`;
    }

    card.innerHTML=`
      <div class="ename serif">${e.name}</div>

      <div class="etimer tnum serif">${secToHM(totalToday)}</div>
      <div class="esub">${sub}</div>
      ${btns}
      <div class="toast" id="toast-${e.id}"><div class="check">✓</div><div class="ttime tnum serif"></div><div class="tlabel"></div><div class="tsegs"></div></div>`;
    wrap.appendChild(card);
  });
  wrap.querySelectorAll('button[data-act]').forEach(b=>{
    b.onclick=()=>punch(b.dataset.id, b.dataset.act);
  });
}

function showToast(empId, timeStr, label, segs, isEnd){
  const tt=document.getElementById('toast-'+empId);
  if(!tt) return;
  tt.classList.toggle('endt', !!isEnd);
  tt.querySelector('.ttime').textContent=timeStr;
  tt.querySelector('.tlabel').textContent=label;
  tt.querySelector('.tsegs').textContent=segs||'';
  tt.classList.add('show');
  setTimeout(()=>tt.classList.remove('show'), isEnd?3400:1800);
}

function punch(empId, act){
  const now=new Date(); const nowISO=now.toISOString(); const tstr=hms(now);
  if(act==='start'){
    DATA.active[empId]={ startTs:nowISO, pauses:[], status:'service' };
    save(); ping(false); renderEmpCards();
    showToast(empId, hm(tstr), 'Début', '', false);
  } else if(act==='pause'){
    const a=DATA.active[empId]; if(!a) return;
    a.pauses.push({startTs:nowISO, endTs:null}); a.status='pause';
    save(); ping(false); renderEmpCards();
    showToast(empId, hm(tstr), 'Pause', '', false);
  } else if(act==='resume'){
    const a=DATA.active[empId]; if(!a) return;
    const open=a.pauses.find(p=>!p.endTs); if(open) open.endTs=nowISO; a.status='service';
    save(); ping(false); renderEmpCards();
    showToast(empId, hm(tstr), 'Reprise', '', false);
  } else if(act==='end'){
    const a=DATA.active[empId]; if(!a) return;
    const open=a.pauses.find(p=>!p.endTs); if(open) open.endTs=nowISO;
    // build shift in start-date's records
    const startD=new Date(a.startTs); const dk=dateKey(startD);
    const sh={ start:hms(startD), end:tstr,
      pauses:a.pauses.filter(p=>p.endTs).map(p=>({start:hms(new Date(p.startTs)), end:hms(new Date(p.endTs))})) };
    if(!DATA.records[dk]) DATA.records[dk]={};
    if(!DATA.records[dk][empId]) DATA.records[dk][empId]={shifts:[], override:(DATA.records[dk][empId]&&DATA.records[dk][empId].override)||null};
    DATA.records[dk][empId].shifts.push(sh);
    delete DATA.active[empId];
    save(); ping(true); renderEmpCards();
    const segTxt = shiftSegments(sh).map(s=>hm(s[0])+'–'+hm(s[1])).join('  /  ');
    showToast(empId, hm(tstr), 'Fin de service', segTxt, true);
  }
}

  document.getElementById('live-date').textContent=L.days[now.getDay()]+' '+now.getDate()+' '+L.months[now.getMonth()].toLowerCase();

      const el=document.querySelectorAll('.ecard')[DATA.employees.indexOf(e)];
      if(el){ const tm=el.querySelector('.etimer'); if(tm) tm.textContent=secToHM(todayCompletedNet(e.id)+activeElapsed(e.id)); }
    }
  });
}

      <div class="seg-edit-head"><span>${lab}</span>
        <label style="display:flex;gap:6px;align-items:center;text-transform:none;letter-spacing:0">
          <input type="checkbox" ${on?'checked':''} onchange="toggleOvSeg('${key}',this.checked)" style="width:auto"> ${on?'':t('rest')}
        </label>
      </div>
      ${on?`<div class="row2">
        <div class="field" style="margin:0"><label>${t('start')}</label><input type="time" value="${ovBuf[key][0]}" onchange="ovBuf.${key}[0]=this.value"></div>
        <div class="field" style="margin:0"><label>${t('end')}</label><input type="time" value="${ovBuf[key][1]}" onchange="ovBuf.${key}[1]=this.value"></div>
      </div>`:''}
    </div>`;
  }
  modal(`<div class="modal-head"><h2 class="serif">${t('dayOverride')}</h2><button class="x" onclick="openAdmin()">×</button></div>
    <div class="modal-body">
      <div class="note">${e.name} · ${recDate}<br>${t('overrideNote')}</div>
      ${segField('am',t('morning'))}
      ${segField('pm',t('afternoon'))}
      <button class="btn-primary" onclick="saveOverride()">${t('save')}</button>
      <button class="btn-sec" onclick="clearOverride()">${t('cancel')} ${t('override')}</button>
    </div>`);
}
function toggleOvSeg(key,on){ ovBuf[key]= on? (key==='am'?['11:30','13:00']:['18:00','21:00']) : null; drawOverride(); }
function saveOverride(){
  const empId=ovBuf.emp;
  if(!DATA.records[recDate]) DATA.records[recDate]={};
  if(!DATA.records[recDate][empId]) DATA.records[recDate][empId]={shifts:[], override:null};
  DATA.records[recDate][empId].override={am:ovBuf.am, pm:ovBuf.pm};
  save(); openAdmin();
}
function clearOverride(){
  const empId=ovBuf.emp;
  if(DATA.records[recDate]&&DATA.records[recDate][empId]){
    DATA.records[recDate][empId].override=null;
    if(!DATA.records[recDate][empId].shifts.length){ delete DATA.records[recDate][empId]; if(!Object.keys(DATA.records[recDate]).length) delete DATA.records[recDate]; }
  }
  save(); openAdmin();
}

// ---------- EMPLOYEES TAB ----------
let schedEmp=null;
function renderEmployees(b){
  if(!schedEmp && DATA.employees[0]) schedEmp=DATA.employees[0].id;
  const L=I18N[DATA.lang];
  let html=`<div class="emp-pick">${DATA.employees.map(e=>`<button class="${schedEmp===e.id?'active':''}" onclick="schedEmp='${e.id}';renderTab()">${e.name}</button>`).join('')}<button onclick="openAddEmp()">+ ${t('addEmp')}</button></div>`;
  const e=emp(schedEmp); if(!e){ b.innerHTML=html; return; }
  // weekly total
  let wk=0; for(let dow=0;dow<7;dow++){ const sc=e.schedule[dow]; if(sc){ if(sc.am)wk+=spanSec(sc.am[0]+':00',sc.am[1]+':00'); if(sc.pm)wk+=spanSec(sc.pm[0]+':00',sc.pm[1]+':00'); } }
  html+=`<div class="stat" style="margin-bottom:16px"><div class="sl">${t('weeklyTotal')} · ${e.name}</div><div class="sv tnum">${secToHM(wk)}</div></div>`;
  const order=[1,2,3,4,5,6,0];
  order.forEach(dow=>{
    const sc=e.schedule[dow];
    html+=`<div class="sched-day"><div class="dn">${L.days[dow]}</div><div class="sched-times">${sc?formatContract({am:sc.am,pm:sc.pm}):t('rest')}</div></div>`;
  });
  html+=`<button class="btn-sec" style="margin-top:14px" onclick="openSchedEdit('${e.id}')">${t('editSchedule')}</button>`;
  html+=`<button class="btn-sec danger" onclick="delEmp('${e.id}')">${t('delete')} · ${e.name}</button>`;
  b.innerHTML=html;
}
let schedBuf=null;
function openSchedEdit(empId){
  const e=emp(empId); schedBuf={emp:empId, name:e.name, schedule:JSON.parse(JSON.stringify(e.schedule))};
  drawSchedEdit();
}
function drawSchedEdit(){
  const L=I18N[DATA.lang]; const order=[1,2,3,4,5,6,0];
  let body=`<div class="field"><label>${t('name')}</label><input value="${schedBuf.name}" onchange="schedBuf.name=this.value"></div>`;
  order.forEach(dow=>{
    const sc=schedBuf.schedule[dow]||{am:null,pm:null};
    function seg(key,lab){
      const on=!!sc[key];
      return `<div style="margin-bottom:6px"><label style="display:flex;gap:6px;align-items:center;font-size:12px;text-transform:none;letter-spacing:0;color:var(--ink)">
        <input type="checkbox" ${on?'checked':''} onchange="toggleSched(${dow},'${key}',this.checked)" style="width:auto"> ${lab}</label>
        ${on?`<div class="row2"><input type="time" value="${sc[key][0]}" onchange="setSched(${dow},'${key}',0,this.value)"><input type="time" value="${sc[key][1]}" onchange="setSched(${dow},'${key}',1,this.value)"></div>`:''}</div>`;
    }
    body+=`<div class="sched-day"><div class="dn">${L.days[dow]}</div>${seg('am',t('morning'))}${seg('pm',t('afternoon'))}</div>`;
  });
  modal(`<div class="modal-head"><h2 class="serif">${t('editSchedule')}</h2><button class="x" onclick="openAdmin()">×</button></div>
    <div class="modal-body">${body}<div style="height:10px"></div><button class="btn-primary" onclick="saveSched()">${t('save')}</button></div>`);
}
function ensureDay(dow){ if(!schedBuf.schedule[dow]) schedBuf.schedule[dow]={am:null,pm:null}; }
function toggleSched(dow,key,on){ ensureDay(dow); schedBuf.schedule[dow][key]= on?(key==='am'?['11:30','13:00']:['18:00','21:00']):null;
  if(!schedBuf.schedule[dow].am && !schedBuf.schedule[dow].pm) schedBuf.schedule[dow]=null; drawSchedEdit(); }
function setSched(dow,key,idx,val){ ensureDay(dow); if(!schedBuf.schedule[dow][key]) schedBuf.schedule[dow][key]=['','']; schedBuf.schedule[dow][key][idx]=val; }
function saveSched(){
  const e=emp(schedBuf.emp); e.name=schedBuf.name.trim()||e.name;
  // normalize empty days to null
  const sc={}; for(let dow=0;dow<7;dow++){ const d=schedBuf.schedule[dow]; sc[dow]=(d&&(d.am||d.pm))?{am:d.am,pm:d.pm}:null; }
  e.schedule=sc; save(); openAdmin();
}
function openAddEmp(){
  const id='emp_'+Date.now();
  DATA.employees.push({id, name:'Nouveau', schedule:{0:null,1:null,2:null,3:null,4:null,5:null,6:null}});
  save(); schedEmp=id; openSchedEdit(id);
}
function delEmp(empId){
  if(!confirm(t('confirmDelEmp'))) return;
  DATA.employees=DATA.employees.filter(e=>e.id!==empId);
  Object.keys(DATA.records).forEach(dk=>{ if(DATA.records[dk][empId]){ delete DATA.records[dk][empId]; if(!Object.keys(DATA.records[dk]).length) delete DATA.records[dk]; } });
  delete DATA.active[empId];
  schedEmp=DATA.employees[0]?DATA.employees[0].id:null; save(); openAdmin();
}

// ---------- SETTINGS TAB ----------
let expYM = todayKey().slice(0,7);
function renderSettings(b){
  const L=I18N[DATA.lang];
  // build month options from records + current
  const months=new Set([todayKey().slice(0,7)]);
  Object.keys(DATA.records).forEach(dk=>months.add(dk.slice(0,7)));
  const mopts=[...months].sort().reverse().map(ym=>{ const [y,m]=ym.split('-'); return `<option value="${ym}" ${expYM===ym?'selected':''}>${L.months[+m-1]} ${y}</option>`; }).join('');
  // monthly stats per employee
  let statHtml='';
  DATA.employees.forEach(e=>{
    let ot=0, net=0, days=0;
    Object.keys(DATA.records).forEach(dk=>{ if(dk.slice(0,7)!==expYM) return; if(!DATA.records[dk][e.id]) return;
      const n=dayNetWorked(e.id,dk); if(n>0){ days++; net+=n; ot+=dayOvertime(e.id,dk).total; } });
    statHtml+=`<div class="stat"><div class="sl">${e.name}</div>
      <div class="sv tnum">${secToHM(net)} <small>· ${t('overtime')} ${secToHM(ot)}</small></div>
      <div class="sl" style="margin-top:6px">${t('daysWorked')}: ${days}</div></div>`;
  });
  b.innerHTML=`
    <div class="note">${t('monthTable')}</div>
    <div class="month-pick"><select onchange="expYM=this.value;renderTab()">${mopts}</select>
      <button class="mini wine" onclick="exportMonth()">${t('monthExport')}</button></div>
    <div class="stat-grid">${statHtml||'<div class="empty">—</div>'}</div>

    <div class="note" style="margin-top:8px">${t('changePin')}</div>
    <div class="field"><label>${t('oldPin')}</label><input id="op" inputmode="numeric" maxlength="4" placeholder="••••"></div>
    <div class="row2">
      <div class="field"><label>${t('newPin')}</label><input id="np" inputmode="numeric" maxlength="4" placeholder="••••"></div>
      <div class="field"><label>${t('confirmPin')}</label><input id="cp" inputmode="numeric" maxlength="4" placeholder="••••"></div>
    </div>
    <div class="pin-err" id="pin-set-msg"></div>
    <button class="btn-sec" onclick="changePin()">${t('changePin')}</button>

    <div class="note" style="margin-top:18px">${t('recovery')}<div class="recovery-box">${DATA.recovery}</div>${t('backInfo')}</div>
    <button class="btn-sec" onclick="exportBackup()">${t('exportData')}</button>
    <label class="btn-sec" style="display:block;text-align:center">${t('importData')}<input type="file" accept=".json" style="display:none" onchange="importBackup(this)"></label>
  `;
}
function changePin(){
  const op=document.getElementById('op').value, np=document.getElementById('np').value, cp=document.getElementById('cp').value;
  const msg=document.getElementById('pin-set-msg');
  if(op!==String(DATA.password)){ msg.textContent=t('wrongOld'); return; }
  if(!/^\d{4}$/.test(np)){ msg.textContent='4 chiffres'; return; }
  if(np!==cp){ msg.textContent=t('pinMismatch'); return; }
  DATA.password=np; save(); msg.style.color='var(--moss)'; msg.textContent='✓ '+t('pinChanged');
}

// ---------- BACKUP ----------
function download(filename, blob){
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },100);
}
function exportBackup(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  download('pointage_sauvegarde_'+todayKey()+'.json', blob);
}
function importBackup(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d&&d.employees&&d.records){ DATA=d; if(!DATA.active)DATA.active={}; if(!DATA.recovery)DATA.recovery=genRecovery(); save(); openAdmin(); } else alert('✕'); }catch(e){ alert('✕'); } };
  r.readAsText(f);
}

/* ===== XLSX export appended below ===== */
</script>
<script>
// ---------- XLSX WRITER (pure JS, offline) ----------
const CRC_TABLE=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0;}return t;})();
function crc32(b){let c=0xFFFFFFFF;for(let i=0;i<b.length;i++)c=CRC_TABLE[(c^b[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
function sB(s){return new TextEncoder().encode(s);}
function zipStore(files){
  const chunks=[],central=[];let offset=0;
  const u16=n=>new Uint8Array([n&0xFF,(n>>>8)&0xFF]);
  const u32=n=>new Uint8Array([n&0xFF,(n>>>8)&0xFF,(n>>>16)&0xFF,(n>>>24)&0xFF]);
  const cat=l=>{let len=l.reduce((a,b)=>a+b.length,0),o=new Uint8Array(len),p=0;for(const x of l){o.set(x,p);p+=x.length;}return o;};
  const push=a=>{chunks.push(a);offset+=a.length;};
  for(const f of files){const nb=sB(f.name),crc=crc32(f.data),lo=offset;
    push(cat([u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(f.data.length),u32(f.data.length),u16(nb.length),u16(0),nb,f.data]));
    central.push({nb,crc,size:f.data.length,lo});}
  const cdStart=offset;
  for(const c of central) push(cat([u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(c.crc),u32(c.size),u32(c.size),u16(c.nb.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(c.lo),c.nb]));
  const cdSize=offset-cdStart;
  push(cat([u32(0x06054b50),u16(0),u16(0),u16(central.length),u16(central.length),u32(cdSize),u32(cdStart),u16(0)]));
  return cat(chunks);
}
function colL(n){let s='';while(n>0){const m=(n-1)%26;s=String.fromCharCode(65+m)+s;n=Math.floor((n-1)/26);}return s;}
function xe(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const X_CT=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>`;
const X_RELS=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`;
const X_WB=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Pointage" sheetId="1" r:id="rId1"/></sheets></workbook>`;
const X_WBR=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`;
const X_ST=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><numFmts count="1"><numFmt numFmtId="164" formatCode="[h]:mm:ss"/></numFmts><fonts count="2"><font><sz val="10"/><name val="Arial"/></font><font><b/><sz val="10"/><name val="Arial"/></font></fonts><fills count="2"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill></fills><borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders><cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs><cellXfs count="3"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/><xf numFmtId="164" fontId="0" fillId="0" borderId="0" xfId="0" applyNumberFormat="1"/><xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0" applyFont="1"/></cellXfs><cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles></styleSheet>`;
function buildSheetXml(emps, daysInMonth, monthName){
  const rows=[]; const lastData=1+daysInMonth;
  let r1=`<row r="1">`;
  emps.forEach((e,i)=>{ const c1=colL(i*2+1),c2=colL(i*2+2);
    r1+=`<c r="${c1}1" t="inlineStr" s="2"><is><t>${xe(monthName)}</t></is></c><c r="${c2}1" t="inlineStr" s="2"><is><t>${xe(e.name)}</t></is></c>`; });
  r1+=`</row>`; rows.push(r1);
  for(let d=1;d<=daysInMonth;d++){ const rr=d+1; let row=`<row r="${rr}">`;
    emps.forEach((e,i)=>{ const c1=colL(i*2+1),c2=colL(i*2+2);
      row+=`<c r="${c1}${rr}" s="0"><v>${d}</v></c>`;
      const v=e.days[d];
      row+= (v&&v>0)?`<c r="${c2}${rr}" s="1"><v>${v/86400}</v></c>`:`<c r="${c2}${rr}" t="inlineStr" s="0"><is><t>-</t></is></c>`;
    }); row+=`</row>`; rows.push(row); }
  const tr=lastData+1; let total=`<row r="${tr}">`;
  emps.forEach((e,i)=>{ const c2=colL(i*2+2); let tot=0; for(let d=1;d<=daysInMonth;d++){const v=e.days[d];if(v&&v>0)tot+=v;}
    total+=`<c r="${c2}${tr}" s="1"><f>SUM(${c2}2:${c2}${lastData})</f><v>${tot/86400}</v></c>`; });
  total+=`</row>`; rows.push(total);
  const lastCol=colL(emps.length*2);
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><dimension ref="A1:${lastCol}${tr}"/><sheetData>${rows.join('')}</sheetData></worksheet>`;
}
function makeXlsx(emps, daysInMonth, monthName){
  return zipStore([
    {name:'[Content_Types].xml',data:sB(X_CT)},
    {name:'_rels/.rels',data:sB(X_RELS)},
    {name:'xl/workbook.xml',data:sB(X_WB)},
    {name:'xl/_rels/workbook.xml.rels',data:sB(X_WBR)},
    {name:'xl/styles.xml',data:sB(X_ST)},
    {name:'xl/worksheets/sheet1.xml',data:sB(buildSheetXml(emps,daysInMonth,monthName))},
  ]);
}
function exportMonth(){
  const [y,m]=expYM.split('-').map(Number);
  const daysInMonth=new Date(y,m,0).getDate();
  const emps=DATA.employees.map(e=>{
    const days={};
    for(let d=1;d<=daysInMonth;d++){ const dk=`${y}-${pad(m)}-${pad(d)}`; const net=dayNetWorked(e.id,dk); if(net>0) days[d]=net; }
    return {name:e.name, days};
  });
  const monthName=I18N[DATA.lang].months[m-1];
  const bytes=makeXlsx(emps, daysInMonth, monthName);
  download(`Pointage_${expYM}.xlsx`, new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));
}
</script>
